<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Đăng Ký</title>
    <link rel="stylesheet" href="trangdangky.css">
</head>
<body>

    <div class="registration-wrapper">
        <h2 class="main-title">Đăng ký</h2>

        <div class="form-row">
            <div class="form-column">
                <p class="desc">Nhập thông tin cá nhân bên dưới:</p>
                <div class="form-group">
                    <label>Họ tên <span class="required">*</span></label>
                    <input type="text" placeholder="Mạc Văn Trung">
                </div>
                <div class="form-group">
                    <label>Điện thoại <span class="required">*</span></label>
                    <input type="text" placeholder="0929292606">
                </div>
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" placeholder="mv.trung1609@gmail.com">
                </div>
            </div>

            <div class="form-column">
                <p class="desc">Nhập thông tin gian hàng bên dưới:</p>
                <div class="form-group">
                    <label>Mã gian hàng <span class="required">*</span> <small>https://DTS.dantrisoft.vn</small></label>
                    <input type="text" class="border-red" placeholder="DTS">
                </div>
                <div class="form-group">
                    <label>Tên gian hàng <span class="required">*</span></label>
                    <input type="text" placeholder="Dân Trí Soft">
                </div>
                <div class="form-group">
                    <label>Địa chỉ</label>
                    <input type="text" placeholder="119 Cống Quỳnh, Quận 1">
                </div>
                <div class="form-group">
                    <label>Loại hình kinh doanh <span class="required">*</span></label>
                    <select>
                        <option>Nhà hàng - Cafe</option>
                    </select>
                </div>
            </div>

            <div class="form-column">
                <p class="desc">Nhập thông tin tài khoản bên dưới:</p>
                <div class="form-group">
                    <label>Tên đăng nhập <span class="required">*</span></label>
                    <input type="text" class="border-red" placeholder="Trung">
                </div>
                <div class="form-group">
                    <label>Mật khẩu <span class="required">*</span></label>
                    <input type="password" class="border-red" placeholder="...">
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu <span class="required">*</span></label>
                    <input type="password" placeholder="...">
                </div>
            </div>
        </div>

        <div class="form-footer">
            <button class="btn-back">← Quay lại</button>
            <button class="btn-submit">Đăng ký</button>
        </div>
    </div>

</body>
</html>
