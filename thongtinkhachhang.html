<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán đơn hàng</title>
    <link rel="stylesheet" href="thongtinkhachhang.css">
</head>
<body>

<div class="checkout-container">
    
    <div class="billing-details">
        <h2>THÔNG TIN KHÁCH HÀNG</h2>
        
        <div class="form-group">
            <label>Họ Tên <span class="required">*</span></label>
            <input type="text" class="input-red-border">
        </div>

        <div class="form-group">
            <label>Địa chỉ <span class="required">*</span></label>
            <input type="text" placeholder="Ghi rõ: Số nhà + xã/phường + Quận/Huyện + Tỉnh/Thành Phố">
        </div>

        <div class="form-group">
            <label>Số điện thoại <span class="required">*</span></label>
            <input type="text">
        </div>

        <div class="row">
            <div class="form-group col-7">
                <label>Địa chỉ email <span class="required">*</span></label>
                <input type="email" class="input-red-border">
            </div>
            <div class="form-group col-5 checkbox-group">
                <input type="checkbox" id="create-account">
                <label for="create-account">Tạo tài khoản mới?</label>
            </div>
        </div>

        <h2 class="mt-20">THÔNG TIN THÊM</h2>
        <div class="form-group">
            <label>Ghi chú</label>
            <textarea placeholder="Ghi chú về giao hàng và nhận hàng"></textarea>
        </div>
    </div>

    <div class="order-summary">
        <div class="summary-box">
            <h3>ĐƠN HÀNG CỦA BẠN</h3>
            
            <table class="order-table">
                <thead>
                    <tr>
                        <th>SẢN PHẨM</th>
                        <th class="text-right">TỔNG CỘNG</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="product-name">7 Nights Tobacco - Tony Exotic × 1</td>
                        <td class="text-right bold">600,000₫</td>
                    </tr>
                    <tr>
                        <td>Tổng phụ</td>
                        <td class="text-right bold">600,000₫</td>
                    </tr>
                    <tr class="total-row">
                        <td>Tổng cộng</td>
                        <td class="text-right bold">600,000₫</td>
                    </tr>
                </tbody>
            </table>

            <div class="payment-methods">
                <div class="method">
                    <input type="radio" name="payment" id="bank" checked>
                    <label for="bank" class="bold">Thanh toán chuyển khoản</label>
                    <p class="method-desc">Thanh toán chuyển khoản</p>
                </div>
                <div class="method">
				<input type="radio" name="payment" id="cod">
                    <label for="cod" class="bold">Thanh toán khi nhận hàng (COD)</label>
                </div>
            </div>

            <button class="btn-order">ĐẶT HÀNG</button>
        </div>
    </div>

</div>

</body>
</html>
