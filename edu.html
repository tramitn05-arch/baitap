<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Đăng Ký ViolEdu</title>
    <link rel="stylesheet" href="edu.css">
</head>
<body>

    <div class="register-container">
        <form class="register-form">
            <div class="form-group">
                <label>Họ tên <span class="required">*</span></label>
                <input type="text" placeholder="Nhập họ và tên">
            </div>

            <div class="form-group">
                <label>Tên đăng nhập <span class="required">*</span></label>
                <input type="text" placeholder="Nhập tên đăng nhập">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Nhập mật khẩu <span class="required">*</span></label>
                    <input type="password" placeholder="Mật khẩu">
                </div>
                <div class="form-group">
                    <label>Nhập lại mật khẩu <span class="required">*</span></label>
                    <input type="password" placeholder="Nhập lại mật khẩu">
                </div>
            </div>

            <div class="form-group">
                <label>Số điện thoại di động <span class="required">*</span></label>
                <input type="tel" placeholder="Nhập số điện thoại">
                <p class="note">Mã xác nhận sẽ được gửi đến số điện thoại này để kích hoạt tài khoản.</p>
            </div>

            <div class="form-group">
                <label>E-mail</label>
                <input type="email" placeholder="Nhập email">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Nơi ở <span class="required">*</span></label>
                    <select>
                        <option>Chọn tỉnh thành</option>
                        <option>Thái Nguyên</option>
                        <option>Khánh Hòa</option>
                        <option>Hà Nội</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>&nbsp;</label> <select>
                        <option>Chọn quận huyện</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <select>
                        <option>Chọn trường học</option>
                    </select>
                </div>
                <div class="form-group">
                    <select>
                        <option>Chọn khối</option>
                    </select>
                </div>
            </div>

            <div class="captcha-box">
                <input type="checkbox"> Tôi không phải là người máy
                <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="captcha" width="30">
            </div>
        </form>
            <p class="terms">Bằng cách nhấp vào Đăng ký, bạn đồng ý với <a href="#">Điều khoản</a> của ViolEdu</p>
            <button type="submit" class="btn-submit">Đăng ký</button>
    </div>

</body>
</html>
