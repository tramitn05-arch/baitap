<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm thành viên</title>
    <link rel="stylesheet" href="themmoithanhvien.css">
</head>
<body>

<div class="container">
    <div class="top-bar">
        <span><b>Chào bạn: admin</b></span>
        <a href="#">Đăng xuất</a>
    </div>

    <h2>Thêm mới thành viên</h2>

    <form>
        <div class="form-group">
            <label>Quyền hạn</label>
            <select>
                <option>Chọn quyền hạn</option>
                <option>Admin</option>
                <option>User</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tên thành viên</label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password">
        </div>

        <div class="form-group">
            <label>Mật khẩu nhập lại</label>
            <input type="password">
        </div>

        <div class="form-group">
            <label>Địa Chỉ Email</label>
            <input type="email">
        </div>

        <div class="buttons">
            <button type="submit">Thêm</button>
            <button type="reset">Làm lại</button>
        </div>
    </form>
</div>

</body>
</html>
