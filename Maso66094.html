<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký Khách Hàng</title>
    <link rel="stylesheet" href="Maso66094.css">
</head>
<body>

<div class="form-container">
    <h1 class="form-title">FORM ĐĂNG KÝ</h1>

    <div class="form-grid header-row">
        <div>Tên nhãn</div>
        <div>Kiểu dữ liệu</div>
        <div>Biến lưu giá trị</div>
    </div>

    <div class="form-grid content-row">
        <div class="input-fake">Họ và tên <span class="red-text">*</span></div>
        <select><option>Ký tự</option></select>
        <div class="var-area">
            <div class="var-box">
                <span class="chip"><span class="red-text">{</span>full_name<span class="red-text">}</span></span>
            </div>
            <span class="remove-x">x</span>
        </div>
    </div>

    <div class="form-grid content-row">
        <div class="input-fake">Số điện thoại <span class="red-text">*</span></div>
        <select><option>Dãy số</option></select>
        <div class="var-area">
            <div class="var-box">
                <span class="chip"><span class="red-text">{</span>phone<span class="red-text">}</span></span>
            </div>
            <span class="remove-x">x</span>
        </div>
    </div>

    <div class="form-grid content-row">
        <div class="input-fake">Email <span class="red-text">*</span></div>
        <select><option>Email</option></select>
        <div class="var-area">
            <div class="var-box">
                <span class="chip"><span class="red-text">{</span>email<span class="red-text">}</span></span>
            </div>
            <span class="remove-x">x</span>
        </div>
    </div>

    <div class="form-grid content-row">
        <div class="input-fake">Tỉnh thành</div>
        <select><option>Tỉnh/thành</option></select>
        <div class="var-area">
            <div class="var-box">
                <span class="chip"><span class="red-text">{</span>city<span class="red-text">}</span></span>
            </div>
            <span class="remove-x">x</span>
        </div>
    </div>

    <div class="form-grid content-row">
        <div class="input-fake">Quận huyện</div>
        <select><option>Quận/huyện</option></select>
        <div class="var-area">
            <div class="var-box">
                <span class="chip"><span class="red-text">{</span>district<span class="red-text">}</span></span>
            </div>
            <span class="remove-x">x</span>
        </div>
    </div>

    <div class="form-grid content-row">
        <div class="input-fake">Phường xã</div>
        <select><option>Phường/xã</option></select>
        <div class="var-area">
            <div class="var-box">
<span class="chip"><span class="red-text">{</span>ward<span class="red-text">}</span></span>
            </div>
            <span class="remove-x">x</span>
        </div>
    </div>

    <div class="form-grid content-row">
        <div class="input-fake">Địa chỉ</div>
        <select><option>Ký tự</option></select>
        <div class="var-area">
            <div class="var-box">
                <span class="chip"><span class="red-text">{</span>address<span class="red-text">}</span></span>
            </div>
            <span class="remove-x">x</span>
        </div>
    </div>

    <button class="add-row-btn"><b>+</b> Thêm dòng</button>

    <button class="submit-btn">ĐĂNG KÝ NGAY</button>
</div>

</body>
</html>
