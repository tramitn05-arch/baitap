<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin nhận kết quả</title>
    <link rel="stylesheet" href="thongtinnhanketqua.css">
</head>
<body>

<div class="container">
    <div class="header">
        THÔNG TIN NHẬN KẾT QUẢ
        <span class="toggle-icon">^</span>
    </div>
    
    <div class="content">
        <p class="instruction">Công dân điền thông tin địa chỉ theo <i>Nơi ở hiện tại/ Nơi tạm trú/ Nơi thường trú</i>:</p>
        
        <div class="row">
            <div class="col-3">
                <label>Tỉnh/ Thành phố *</label>
                <select>
                    <option>Thành phố</option>
                </select>
            </div>
            <div class="col-3">
                <label>Quận/ Huyện *</label>
                <select>
                    <option>Quận</option>
                </select>
            </div>
            <div class="col-3">
                <label>Phường/ Xã *</label>
                <select>
                    <option>Phường</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <label>Địa chỉ (số nhà, đường phố, thôn, xóm, làng, ấp, bản, buôn, phum, sóc) *</label>
                <input type="text" class="error-border">
            </div>
        </div>

        <div class="row">
            <div class="col-6">
                <label>Họ và tên người nhận *</label>
                <input type="text">
            </div>
            <div class="col-6">
                <label>Số điện thoại liên hệ *</label>
                <input type="text">
            </div>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" checked id="cam-doan">
            <label for="cam-doan">Tôi xin cam đoan những thông tin kê khai trên là đúng sự thật</label>
        </div>

        <div class="button-group">
            <button class="btn btn-red">Quay lại</button>
            <button class="btn btn-red">Xem DC02</button>
            <button class="btn btn-red">Lưu và Tiếp tục >>></button>
        </div>
    </div>
</div>

</body>
</html>
