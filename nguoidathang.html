<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin người đặt hàng</title>
    <link rel="stylesheet" href="nguoidathang.css">
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <span class="step-number">2</span> THÔNG TIN NGƯỜI ĐẶT HÀNG
    </div>

    <form>
        <div class="form-group">
            <label>Họ & Tên *</label>
            <input type="text" name="fullname" required>
        </div>

        <div class="form-group">
            <label>Điện thoại di động *</label>
            <input type="tel" name="mobile" required>
        </div>

        <div class="form-group">
            <label>Điện thoại bàn (nếu có)</label>
            <input type="tel" name="phone" value="0">
        </div>

        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Địa chỉ *</label>
            <input type="text" name="address" required>
        </div>

        <div class="form-group">
            <label>Tỉnh/Tp *</label>
            <select name="city" required>
                <option value="">Chọn tỉnh/Tp</option>
                <option value="hanoi">Hà Nội</option>
                <option value="hcm">TP. Hồ Chí Minh</option>
            </select>
        </div>

        <div class="form-group">
            <label>Quận/Huyện *</label>
            <select name="district" required>
                <option value="">Chọn quận</option>
            </select>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="same-info">
            <label for="same-info">Thông tin người nhận hàng giống thông tin người đặt hàng</label>
        </div>
    </form>
</div>

</body>
</html>
