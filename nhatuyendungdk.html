<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Nhà tuyển dụng đăng ký</title>
    <link rel="stylesheet" href="nhatuyendungdk.css" />
  </head>
  <body>
    <div class="container">
      <h2>NHÀ TUYỂN DỤNG ĐĂNG KÝ</h2>

      <form>
        <h3>Thông tin đăng nhập:</h3>

        <div class="input-group">
          <input type="email" placeholder="Email đăng nhập" />
          <span>📧</span>
        </div>

        <div class="input-group">
          <input type="password" placeholder="Mật khẩu" />
          <span>🔒</span>
        </div>

        <div class="input-group">
          <input type="password" placeholder="Nhập lại mật khẩu" />
          <span>🔁</span>
        </div>

        <h3>Thông tin Doanh nghiệp:</h3>

        <div class="input-group">
          <input type="text" placeholder="Tên doanh nghiệp" />
          <span>🏢</span>
        </div>

        <div class="input-group">
          <input type="text" placeholder="Địa chỉ" />
          <span>📍</span>
        </div>

        <div class="input-group">
          <input type="text" placeholder="Điện thoại" />
          <span>📞</span>
        </div>

        <div class="input-group">
          <input type="email" placeholder="Email doanh nghiệp" />
          <span>📧</span>
        </div>

        <div class="captcha">
          <input type="text" placeholder="Mã an toàn" />
          <div class="code">354e3</div>
        </div>

        <div class="agree">
          <input type="checkbox" id="agree" />
          <label for="agree" >Tôi đã đọc và đồng ý các <span class="blue-text">Thỏa thuận sử dụng.</span></label>
        </div>

        <button type="submit">👥 ĐĂNG KÝ</button>
      </form>
    </div>
  </body>
</html>
