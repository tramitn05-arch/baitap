<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Đăng Ký</title>
    <link rel="stylesheet" href="sothich.css" />
  </head>
  <body>
    <div class="form-container">
      <form action="#">
        <table>
          <tr>
            <td>Tên</td>
            <td><input type="text" class="input-full" /></td>
          </tr>
          <tr>
            <td>Giới tính</td>
            <td>
              <input type="radio" name="gender" id="nam" />
              <label for="nam">Nam</label>
              <input type="radio" name="gender" id="nu" />
              <label for="nu">Nữ</label>
            </td>
          </tr>
          <tr>
            <td>Ngày sinh</td>
            <td><input type="text" class="input-full" /></td>
          </tr>
          <tr>
            <td>Tên đăng nhập</td>
            <td><input type="text" class="input-full" /></td>
          </tr>
          <tr>
            <td>Mật khẩu</td>
            <td><input type="password" class="input-full" /></td>
          </tr>
          <tr>
            <td>Xác nhận mật khẩu</td>
            <td><input type="password" class="input-full" /></td>
          </tr>
          <tr>
            <td style="vertical-align: top; padding-top: 10px">Địa chỉ</td>
            <td><textarea rows="6"></textarea></td>
          </tr>
          <tr>
            <td>Thành phố</td>
            <td>
              <select>
                <option>--Mời chọn---</option>
                <option>Hà Nội</option>
                <option>Đà Nẵng</option>
                <option>TP. Hồ Chí Minh</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>Điện thoại</td>
            <td><input type="text" class="input-full" /></td>
          </tr>
          <tr>
            <td>Email</td>
            <td><input type="email" class="input-full" /></td>
          </tr>
          <tr>
            <td style="vertical-align: top; padding-top: 5px">Sở thích</td>
            <td>
              <div class="hobbies">
                <div class="hobby-item">
                  <input type="checkbox" id="bongda" />
                  <label for="bongda">Bóng đá</label>
                </div>
                <div class="hobby-item">
                  <input type="checkbox" id="xemphim" />
                  <label for="xemphim">Xem phim</label>
                </div>
                <div class="hobby-item">
                  <input type="checkbox" id="nghenhac" />
                  <label for="nghenhac">Nghe nhạc</label>
                </div>
                <div class="hobby-item">
                  <input type="checkbox" id="docsach" />
                  <label for="docsach">Đọc sách</label>
                </div>
              </div>
            </td>
          </tr>
          <tr>
            <td></td>
            <td class="buttons">
              <button type="submit">Đăng ký</button>
              <button type="reset">Làm lại</button>
            </td>
          </tr>
        </table>
      </form>
    </div>
  </body>
</html>
