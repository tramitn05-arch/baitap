<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký khách hàng</title>
    <link rel="stylesheet" href="khachhangthanthiet.css">
</head>
<body>

<div class="container">
    <div class="title">
        ĐĂNG KÝ KHÁCH HÀNG THÂN THIẾT - TRA CỨU BÁO GIÁ
    </div>

    <p class="note">Tất cả thông tin có dấu (*) là bắt buộc.</p>

    <form>
        <input type="text" placeholder="Tên công ty của quý khách (nếu có)">

        <div class="row">
            <input type="text" placeholder="Họ Tên (*)">
            <input type="email" placeholder="Email">
        </div>

        <div class="row">
            <input type="text" placeholder="Số điện thoại (*)">
            <input type="password" placeholder="Mật khẩu tra cứu báo giá (*)">
            <select>
                <option>Chọn trạm đăng ký (*)</option>
                <option>Hà Nội</option>
                <option>HCM</option>
            </select>
        </div>

        <input type="text" placeholder="Địa chỉ (*)">

        <div class="btn-box">
            <button type="submit">ĐĂNG KÝ</button>
        </div>
    </form>
</div>

</body>
</html>
