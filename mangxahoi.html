<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Đăng Ký</title>
    <link rel="stylesheet" href="mangxahoi.css">
</head>
<body>

    <div class="container">
        <h2>Đăng ký nhận thông tin</h2>
        <p class="sub-title">Thông tin liên hệ</p>

        <form>
            <div class="row">
                <div class="group"><label>Họ và Tên*:</label><input type="text" placeholder="Nhập tên của bạn"></div>
                <div class="group"><label>Số điện thoại*:</label><input type="text" placeholder="Nhập số điện thoại"></div>
            </div>

            <div class="row">
                <div class="group"><label>Email*:</label><input type="email" placeholder="Nhập email"></div>
                <div class="group"><label>Số hợp đồng:</label><input type="text" placeholder="Nhập số hợp đồng"></div>
            </div>

            <div class="row">
                <div class="group"><label>Tin nhắn SMS</label><select><option>----</option></select></div>
                <div class="group"><label>Điện thoại</label><select><option>----</option></select></div>
            </div>

            <div class="row">
                <div class="group"><label>Email</label><select><option>----</option></select></div>
                <div class="group"><label>my Sun Life</label><select><option>----</option></select></div>
            </div>

            <div class="row">
                <div class="group">
                    <label>Mạng Xã Hội</label>
                    <select><option>----</option></select>
                </div>
                <div class="group empty-column"></div>
            </div>
        </form>
    </div>

</body>
</html>
