<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin đặt hàng</title>
    <link rel="stylesheet" href="thongtindathang.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="popup-container">
    <div class="header">
        <span class="title">THÔNG TIN ĐẶT HÀNG</span>
        <span class="close-icon">×</span>
    </div>

    <div class="form-content">
        <div class="col">
            <div class="input-item">
                <div class="icon-box"><i class="fas fa-user"></i></div>
                <input type="text" placeholder="Vui lòng nhập đầy đủ Họ Tên">
            </div>
            <div class="input-item">
                <div class="icon-box"><i class="fas fa-burn"></i></div>
				<input type="text" value="Nghệ đen 500gam" style="font-weight: bold;">           
			</div>
            <div class="input-item">
                <div class="icon-box"><i class="fas fa-home"></i></div>
                <input type="text" placeholder="Nhập địa chỉ">
            </div>
            <button class="btn-reg">Đăng ký</button>
        </div>

        <div class="col">
            <div class="input-item">
                <div class="icon-box"><i class="fas fa-envelope"></i></div>
                <input type="text" placeholder="Vui lòng nhập Email">
            </div>
            <div class="input-item">
                <div class="icon-box"><i class="fas fa-phone"></i></div>
                <input type="text" placeholder="Số điện thoại">
            </div>
            <div class="input-item">
                <div class="icon-box"><strong>i</strong></div>
                <input type="text" placeholder="Số lượng">
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="step-box">
            <span class="step-title">Bước 3:</span><br>
            <span class="step-desc">Nhập thông tin khách hàng</span>
        </div>
        <button class="btn-close">Close</button>
    </div>
</div>

</body>
</html>
