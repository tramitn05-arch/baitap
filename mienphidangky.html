<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký vay</title>
    <link rel="stylesheet" href="mienphidangky.css">
</head>
<body>

<div class="container">
    <h2>MIỄN PHÍ ĐĂNG KÝ<br>NHẬN TIỀN TỨC THÌ</h2>

    <form>
        <input type="text" placeholder="Họ và tên*" required>
        <input type="tel" placeholder="Số điện thoại*" required>
        <input type="text" placeholder="CCCD Loại 12 số*" required>

        <select required>
            <option value="">Chọn tỉnh/thành*</option>
            <option>Hà Nội</option>
            <option>TP.HCM</option>
            <option>Thái Nguyên</option>
        </select>

        <p class="ref">Bấm vào đây nếu có Mã giới thiệu</p>

        <div class="checkbox">
            <input type="checkbox" id="agree">
            <label for="agree">
                Tôi đã đọc, hiểu rõ và đồng ý với các điều khoản & điều kiện trong
                Thỏa thuận về xử lý dữ liệu cá nhân của Mirae Asset Finance Company (Vietnam)
            </label>
        </div>

        <button type="submit">ĐĂNG KÝ VAY</button>
    </form>
</div>

</body>
</html>
