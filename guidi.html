<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu mẫu đăng ký tư vấn</title>
    <link rel="stylesheet" href="guidi.css">
</head>
<body>

    <div class="form-container">
        <form>
            <div class="row">
                <div class="form-group">
                    <label>Tên đầy đủ *</label>
                    <input type="text" placeholder="Tên đầy đủ">
                </div>
                <div class="form-group">
                    <label>Di động (Zalo) *</label>
                    <input type="text" placeholder="Di động">
                </div>
            </div>

            <div class="form-group">
                <label>Email *</label>
                <input type="email" placeholder="Email">
            </div>

            <div class="form-group">
                <label>Tên Doanh nghiệp / Tổ chức</label>
                <input type="text" placeholder="Tên Doanh nghiệp / Tổ chức">
            </div>

            <div class="form-group">
                <label>Hạn mức gửi</label>
                <select>
                    <option value="">--Chọn--</option>
                    <option value="1">Dưới 10 triệu</option>
                    <option value="2">10 - 50 triệu</option>
                    <option value="3">Trên 50 triệu</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nội dung yêu cầu</label>
                <textarea placeholder="Mô tả thông tin yêu cầu chi tiết của quý khách..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Gửi đi</button>
        </form>
    </div>

</body>
</html>
